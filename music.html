<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Stellara - Music</title>
	<link rel="stylesheet" href="data/style.css" type="text/css" media="all">
	<link rel="stylesheet" href="data/sidebar.css" type="text/css" media="all">
	<script defer src="data/sidebar.js"></script>
	<link rel="stylesheet" href="data/player.css" type="text/css" media="all">
	<script src="data/player.js"></script>
	<link rel="stylesheet" href="data/music.css" type="text/css" media="all">
	<script type="module" src="data/searchbar.js"></script>
</head>
<body>
	<div class="topbar">
		<button class="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
	</div>
	<div class="sidebar no-anim">
		<div class="sidebar-content">
			<h1 class="title">Stellara</h1>
			<h2 class="page-index-item">
				<a class="page-link" href="https://nicholasjdi.github.io/stellara/home">Home</a>
			</h2>
			<h3 class="page-index-item">
				<a class="page-link" href="https://nicholasjdi.github.io/stellara/home#about">About</a>
			</h3>
            <h3 class="page-index-item">
                <a class="page-link" href="https://nicholasjdi.github.io/stellara/home#contact">Contact</a>
            </h3>
			<h3 class="page-index-item">
				<a class="page-link" href="https://nicholasjdi.github.io/stellara/home#attribution">Attribution</a>
			</h3>
			<h2 class="page-index-item">
                <a class="page-link current" href="https://nicholasjdi.github.io/stellara/music">Music</a>
			</h2>
			<div class="player">
				<div class="player-details">
					<img class="player-cover-art" src="https://beta.geoxor.moe/covers/moonlight.png">
					<p class="player-title">Rain of Past Times</p>
					<p class="player-artist">by Stellara</p>
				</div>
				<div class="player-controls">
					<button class="player-button loop" >L</button>
					<button class="player-button previous">P</button>
					<button class="player-button play-pause">H</button>
					<button class="player-button next">N</button>
					<button class="player-button volume">V</button>
				</div>
				<div class="player-info">
					<p class="player-time">0</p>
					<input class="player-bar" type="range" max="1000" min="0">
					<p class="player-length">0</p>
				</div>
			</div>
		</div>
	</div>
	<div class="content">
		<div class="content-inner">
			<input type="text" class="searchbar" placeholder="Search...">
			<div class="song-list"><h2 class="no-results-text">No Results</h2></div>
			<div class="dropdown">
				<a class="dropdown-item" id="download-with-art" target="_blank" download="">Download<br>(With Art)</a>
				<a class="dropdown-item" id="download-no-art" target="_blank" download="">Download<br>(No Art)</a>
				<a class="dropdown-item" id="download-library" target="_blank" download="">Download<br>(Library)</a>
				<a class="dropdown-item" id="download-art-high-res" target="_blank" download="">Download<br>Cover Art</a>
				<button class="dropdown-item bottom" id="open-menu">More Track Info..</button>
			</div>
		</div>
	</div>
	<div class="menu-box">
		<div class="track-info-menu">
			<div class="menu-bar">
				<button class="close-info-menu-button">X</button>
				<button class="size-info-menu-button">□</button>
				<button class="raw-data-menu-button">Raw Data</buttom>
				<button class="track-info-menu-button">Track Info</button>
			</div>
			<div class="info-menu">
				info go here
			</div>
			<div class="raw-data-menu">test</div>
		</div>
	</div>
</body>
</html>
